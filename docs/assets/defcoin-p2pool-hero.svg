<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Defcoin P2Pool</title>
  <desc id="desc">A dark Defcoin P2Pool banner with a gold coin mark, peer graph lines, and the words decentralized mining infrastructure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07141c"/>
      <stop offset="0.55" stop-color="#05070b"/>
      <stop offset="1" stop-color="#130018"/>
    </linearGradient>
    <radialGradient id="coin" cx="45%" cy="35%" r="65%">
      <stop offset="0" stop-color="#fff4b5"/>
      <stop offset="0.44" stop-color="#d5a642"/>
      <stop offset="1" stop-color="#8b6720"/>
    </radialGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M 38 0 L 0 0 0 38" fill="none" stroke="#26354b" stroke-width="1" opacity="0.35"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1280" height="420" rx="24" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="24" fill="url(#grid)" opacity="0.55"/>
  <path d="M68 332 C220 216 318 268 462 170 C582 88 718 110 850 205 C990 306 1066 184 1209 104" fill="none" stroke="#3bd4ff" stroke-width="2" opacity="0.22"/>
  <path d="M78 294 C216 191 352 222 510 129 C656 43 798 108 936 181 C1050 241 1121 166 1210 121" fill="none" stroke="#ded13b" stroke-width="2" opacity="0.26"/>
  <g filter="url(#shadow)">
    <circle cx="196" cy="206" r="86" fill="url(#coin)" stroke="#ffeaa0" stroke-width="5"/>
    <circle cx="196" cy="206" r="69" fill="none" stroke="#735916" stroke-width="3" opacity="0.55"/>
    <circle cx="164" cy="180" r="11" fill="#f4d579" stroke="#765d1d" stroke-width="2"/>
    <circle cx="211" cy="180" r="11" fill="#f4d579" stroke="#765d1d" stroke-width="2"/>
    <path d="M160 228 C175 247 215 247 232 228" fill="none" stroke="#765d1d" stroke-width="6" stroke-linecap="round"/>
    <path d="M141 276 L258 137 M259 276 L141 137" stroke="#765d1d" stroke-width="11" stroke-linecap="round"/>
  </g>
  <g fill="#f5f7fb">
    <text x="322" y="155" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="2">Defcoin P2Pool</text>
    <text x="326" y="215" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="600" fill="#ded13b">decentralized mining infrastructure for Defcoin</text>
    <text x="326" y="270" font-family="Inter, Arial, sans-serif" font-size="22" fill="#c7d0db">Python 3 port • dual magic support • v36 donation dust fix • separable backend and frontend</text>
  </g>
</svg>
